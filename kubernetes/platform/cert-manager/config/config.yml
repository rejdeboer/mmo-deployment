apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
  namespace: cert-manager
spec:
  acme:
    email: rick.deboer@live.nl
    # The server is replaced in /clusters/<environment>/platform.yml
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: issuer-account-key
    solvers:
      - selector:
          dnsZones:
            - '${DOMAIN}'
        dns01:
          cnameStrategy: Follow
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-secret
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: whoami
  namespace: default
spec:
  secretName: whoami-tls-app
  dnsNames:
    - "game.${DOMAIN}"
    - "game-provisioner.${DOMAIN}"
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: whoami
  namespace: monitoring
spec:
  secretName: whoami-tls-monitoring
  dnsNames:
    - "grafana.${DOMAIN}"
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
