apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: harbor
  namespace: flux-system
spec:
  interval: 2h0m
  url: https://helm.goharbor.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: harbor
      version: "1.19.1"
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: flux-system
      interval: 1h

  values:
    externalURL: https://harbor.${DOMAIN}
    expose:
      type: ingress
      ingress:
        hosts:
          core: harbor.${DOMAIN}
        className: traefik
        annotations:
          ingress.kubernetes.io/ssl-redirect: "true"

    harborAdminPassword: ""
    secretKey: ""

    existingSecretAdminPassword: "harbor-credentials"
    existingSecretSecretKey: "harbor-credentials"

    persistence:
      enabled: true
      persistentVolumeClaim:
        # TODO: If we ever go multi-node, the default local-path storage class won't work
        registry:
          size: 50Gi
        chartmuseum:
          size: 5Gi
        database:
          size: 10Gi
        redis:
          size: 2Gi
