apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nats
  namespace: flux-system
spec:
  interval: 24h
  url: https://nats-io.github.io/k8s/helm/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nats
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: nats
      version: "2.14.0"
      sourceRef:
        kind: HelmRepository
        name: nats
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
      remediateLastFailure: true
  targetNamespace: nats
  values:
    config:
      cluster:
        enabled: false
      jetstream:
        enabled: false
    container:
      merge:
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
