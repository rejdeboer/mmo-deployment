apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: grafana
      version: "12.4.1"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
  values:
    admin:
      existingSecret: grafana-admin
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - grafana.${DOMAIN}
      grafana.ini:
      server:
        domain: grafana.${DOMAIN}
    sidecar:
      dashboards:
        enabled: true
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          url: http://loki-gateway.monitoring
          access: proxy
          isDefault: true
          jsonData:
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: "trace_id=(\\w+)"
                name: TraceID
                url: "$${__value.raw}"
        - name: Mimir
          type: prometheus
          url: http://mimir-gateway.monitoring/prometheus
          access: proxy
          isDefault: false
        - name: Tempo
          type: tempo
          uid: tempo
          url: http://tempo.monitoring.svc.cluster.local:3200
          access: proxy
          jsonData:
            nodeGraph:
              enabled: true
            lokiSearch:
              datasourceUid: loki


