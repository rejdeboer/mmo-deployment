apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: agones
  namespace: flux-system
spec:
  interval: 24h
  url: https://agones.dev/chart/stable
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agones
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: agones
      version: "1.56.0"
      sourceRef:
        kind: HelmRepository
        name: agones
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
      remediateLastFailure: true
  targetNamespace: agones-system
  values:
    agones:
      ping:
        install: false
      metrics:
        serviceMonitor:
          enabled: true
