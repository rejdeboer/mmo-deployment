apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: grafana
      version: "11.3.6"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
  values:
    admin:
      existingSecret: grafana-admin
    grafana.ini:
      server:
        domain: grafana.rejdeboer.com
    datasources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring
      access: proxy
      isDefault: true
    - name: Mimir
      type: prometheus
      url: http://mimir-gateway.monitoring/prometheus
      access: proxy
      isDefault: false

