apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: grafana
      version: "11.3.6"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
  values:
    admin:
      existingSecret: grafana-admin
    grafana.ini:
      server:
        domain: grafana.rejdeboer.com
