apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: k8s-monitoring
      version: "11.3.6"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
  values:
    admin:
      existingSecret: grafana-admin
