apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: k8s-monitoring
      version: "4.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
  values:

    destinations:
      - name: mimir
        type: prometheus
        url: "http://mimir-mimir-distributor.monitoring.svc.cluster.local:8080/api/v1/push"
      - name: loki
        type: loki
        url: "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
      - name: tempo
        type: tempo
        url: "tempo.monitoring.svc.cluster.local:4317"

    clusterMetrics:
      enabled: true

    hostMetrics:
      enabled: true
      prometheus-node-exporter:
        enabled: true

    podLogsViaLoki:
      enabled: true

    prometheusOperatorObjects:
      enabled: true

    telemetryServices:
      kube-state-metrics:
        enabled: true

    # Alloy instances
    alloy-metrics:
      enabled: true
    alloy-logs:
      enabled: true

